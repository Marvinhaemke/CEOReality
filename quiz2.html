        // --- TRACKING & CONSENT HELPER ---
        const CONSENT_STORAGE_KEY = 'ceo_reality_consent';
        const CONSENT_EXPIRY_DAYS = 365;
        window.marketingConsent = false;
        let pixelLoaded = false;

        function getStoredConsent() {
            try {
                const raw = localStorage.getItem(CONSENT_STORAGE_KEY);
                if (!raw) return null;
                const parsed = JSON.parse(raw);
                if (parsed.expires && Date.now() > parsed.expires) {
                    localStorage.removeItem(CONSENT_STORAGE_KEY);
                    return null;
                }
                return parsed.value;
            } catch (e) {
                return null;
            }
        }

        function storeConsent(value) {
            try {
                localStorage.setItem(CONSENT_STORAGE_KEY, JSON.stringify({
                    value: value,
                    timestamp: Date.now(),
                    expires: Date.now() + CONSENT_EXPIRY_DAYS * 24 * 60 * 60 * 1000
                }));
            } catch (e) {
                console.warn('Could not store consent:', e);
            }
        }

            if (pixelLoaded) return;
            pixelLoaded = true;
            !function(f,b,e,v,n,t,s)
            {if(f.fbq)return;n=f.fbq=function(){n.callMethod?
            n.callMethod.apply(n,arguments):n.queue.push(arguments)};
            if(!f._fbq)f._fbq=n;n.push=n;n.loaded=!0;n.version='2.0';

            fbq('init', '26542472978694567');
            fbq('track', 'PageView');
        }

        function showCookieBanner() {
            const banner = document.getElementById('cookie-banner');
            if (banner) requestAnimationFrame(() => { banner.classList.add('cookie-banner-visible'); });
        }

        function hideCookieBanner() {
            const banner = document.getElementById('cookie-banner');
            if (banner) banner.classList.remove('cookie-banner-visible');
        }

        function acceptCookies() {
            storeConsent('accepted'); 
            window.marketingConsent = true; 
            loadMetaPixel(); 
            hideCookieBanner();
        }

        function rejectCookies() {
            storeConsent('rejected'); 
            window.marketingConsent = false; 
            hideCookieBanner();
        }

        function getCookie(name) {
            const match = document.cookie.match(new RegExp('(^| )' + name + '=([^;]+)'));
            if (match) return match[2];
            return null;
        }

        function getUrlParams() {
            const params = new URLSearchParams(window.location.search);
            const result = {};
            for (const [key, value] of params.entries()) { result[key] = value; }
            return result;
        }

        function generateEventId() {
            if (window.crypto && typeof window.crypto.randomUUID === 'function') { return window.crypto.randomUUID(); }
            return 'evt_' + Date.now() + '_' + Math.random().toString(36).slice(2, 11);

            steuerung: { points: 0, max: 12, label: "Steuerung" }
        };
        
        let collectedRedFlags = [];

        const DOM_CONTENT = document.getElementById('dynamic-content');
        const DOM_HEADER = document.getElementById('quiz-header');
        let phoneInputInstance = null;

        // --- LOGIC ---
        function renderQuestion() {
            if (currentQuestionIndex >= questions.length) {
                renderLeadForm();
                return;
            }

            const q = questions[currentQuestionIndex];
            const progress = ((currentQuestionIndex + 1) / (questions.length + 1)) * 100;
            
            document.getElementById('step-counter').innerText = `${currentQuestionIndex + 1} / ${questions.length}`;
            document.getElementById('progress-line').style.width = `${progress}%`;

            const mappedAnswers = q.answers.map((ans, originalIdx) => ({ ...ans, originalIdx }));
            const displayedAnswers = q.shuffle ? shuffleArray(mappedAnswers) : mappedAnswers;

            let answersHTML = displayedAnswers.map((ans, idx) => `
                <button type="button" id="btn-${idx}" onclick="handleAnswer(${idx}, ${ans.originalIdx})" 
                    class="quiz-option fade-in group" style="animation-delay: ${idx * 0.1}s">
                    <div class="flex justify-between items-center">
                        <span class="font-semibold text-gray-900 transition-colors">${ans.text}</span>
                        <i data-lucide="chevron-right" class="w-5 h-5 text-gray-400 transition-colors"></i>
                    </div>
                </button>
            `).join('');

            DOM_CONTENT.innerHTML = `
                <div class="fade-in">
                    <span class="text-brand-orange font-mono text-xs font-bold tracking-widest uppercase mb-2 block">${q.rubrik}</span>
                    <h3 class="font-oswald text-2xl sm:text-3xl font-bold uppercase mb-6 text-gray-900 leading-tight">${q.text}</h3>
                    
                    <div class="space-y-3 relative" id="answers-container">
                        ${answersHTML}
                    </div>

                    <div id="feedback-container"></div>
                </div>
            `;
            lucide.createIcons();
        }

        function handleAnswer(btnDOMIdx, originalDataIdx) {
            const q = questions[currentQuestionIndex];
            const chosenAnswer = q.answers[originalDataIdx];
            
            areaScores[q.category].points += chosenAnswer.points;
            if (chosenAnswer.redFlag) {
                collectedRedFlags.push(chosenAnswer.redFlag);
            }
            
            const container = document.getElementById('answers-container');
            const buttons = container.querySelectorAll('.quiz-option');
            
            buttons.forEach((btn, idx) => {
                btn.disabled = true;
                if (idx === btnDOMIdx) {
                    btn.classList.add('selected');
                } else {
                    btn.classList.add('opacity-40');
                }
            });

            const isGoodAnswer = chosenAnswer.points >= 3;
            const borderClass = isGoodAnswer ? 'border-green-500' : 'border-brand-orange';
            const iconClass = isGoodAnswer ? 'text-green-500' : 'text-brand-orange';
            const iconName = isGoodAnswer ? 'check-circle' : 'alert-triangle';
            const labelText = isGoodAnswer ? 'Solide' : 'Reality Check';

            const feedbackHTML = `
                <div class="feedback-toast mt-8 flex flex-col gap-4">
                    <div class="bg-gray-900 text-white p-5 sm:p-6 rounded-xl border-l-4 ${borderClass} shadow-xl flex items-start gap-4">
                        <i data-lucide="${iconName}" class="w-6 h-6 ${iconClass} flex-shrink-0 mt-0.5"></i>
                        <div>
                            <div class="text-[0.65rem] text-gray-400 uppercase tracking-widest mb-1 font-mono">${labelText}</div>
                            <p class="font-semibold text-base sm:text-lg leading-snug">${chosenAnswer.feedback}</p>
                        </div>
                    </div>

                    ${q.note ? `
                    <div class="bg-gray-50 border border-gray-200 border-l-4 border-l-gray-900 p-5 rounded-r-lg">
                        <p class="text-sm sm:text-base text-gray-800 font-medium leading-relaxed">
                            <span class="font-bold font-oswald uppercase tracking-wider text-gray-900 mr-2">Notiz:</span> ${q.note}
                        </p>
                    </div>` : ''}

                    <div class="flex justify-end mt-4">
                        <button type="button" onclick="advanceToNextQuestion()" class="btn-glow px-8 py-4 rounded-lg text-base font-oswald font-bold uppercase tracking-wide w-full sm:w-auto text-center flex items-center justify-center gap-2">
                            Weiter <i data-lucide="arrow-right" class="w-5 h-5"></i>
                        </button>
                    </div>
                </div>
            `;
            
            document.getElementById('feedback-container').innerHTML = feedbackHTML;
            lucide.createIcons();
            
            if (window.innerWidth < 640) {
                document.getElementById('feedback-container').scrollIntoView({ behavior: 'smooth', block: 'end' });
            }
        }

        function advanceToNextQuestion() {
            currentQuestionIndex++;
            renderQuestion();
        }

        function renderLeadForm() {
            document.getElementById('step-counter').innerText = "Auswertung";
            document.getElementById('progress-line').style.width = `95%`;

            DOM_CONTENT.innerHTML = `
                <div class="fade-in">
                    <h3 class="font-oswald text-2xl sm:text-3xl font-bold uppercase mb-2 text-gray-900 leading-tight">Die Analyse ist bereit.</h3>
                    <p class="text-sm text-gray-500 mb-6">Wir haben deine Engpässe identifiziert. Wohin dürfen wir das Detail-Ergebnis schicken?</p>
                    
                    <form id="lead-form" class="space-y-4 mb-6">
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                            <div>
                                <label class="block text-xs font-semibold text-gray-700 uppercase tracking-wide mb-1">Vorname</label>
                                <input type="text" id="firstName" class="input-field" placeholder="Max" required>
                            </div>
                            <div>
                                <label class="block text-xs font-semibold text-gray-700 uppercase tracking-wide mb-1">Nachname</label>
                                <input type="text" id="lastName" class="input-field" placeholder="Mustermann" required>
                            </div>
                        </div>
                        <div>
                            <label class="block text-xs font-semibold text-gray-700 uppercase tracking-wide mb-1">E-Mail Adresse</label>
                            <input type="email" id="email" class="input-field" placeholder="max@unternehmen.de" required>
                        </div>
                        <div>
                            <label class="block text-xs font-semibold text-gray-700 uppercase tracking-wide mb-1">Handynummer</label>
                            <input type="tel" id="phone" class="input-field" required>
                        </div>
                        <div>
                            <label class="block text-xs font-semibold text-gray-700 uppercase tracking-wide mb-1">Aktueller Monatsumsatz</label>
                            <select id="revenue" class="input-field cursor-pointer" required>
                                <option value="" disabled selected>Bitte wählen...</option>
                                <option value="<30k">Unter 30.000 €</option>
                                <option value="30k-100k">30.000 € bis 100.000 €</option>
                                <option value="100k-300k">100.000 € bis 300.000 €</option>
                                <option value="300k-1M">300.000 € bis 1 Mio. €</option>
                                <option value="1M+">Über 1 Mio. €</option>
                            </select>
                        </div>

                        <div class="bg-orange-50 border border-brand-orange/20 p-4 rounded-lg mt-4">
                            <label class="flex items-start gap-3 cursor-pointer">
                                <input type="checkbox" id="commitment" class="w-5 h-5 text-brand-orange mt-0.5 border-gray-300 rounded" required>
                                <span class="text-gray-800 text-sm font-medium">Ich verstehe, dass CEO Reality ein hochpreisiges Mentoring ist und bin bereit zu investieren, falls ich mich bewerbe.</span>
                            </label>
                        </div>

                        <div id="form-error" class="hidden p-3 rounded bg-red-50 text-red-700 text-sm font-semibold"></div>

                        <button type="button" onclick="calculateResult()" class="btn-glow w-full px-8 py-4 rounded-lg font-oswald uppercase font-bold text-white tracking-wide text-lg mt-6">
                            Detail-Analyse enthüllen
                        </button>
                    </form>
                </div>
            `;

            const phoneInputField = document.querySelector("#phone");
            phoneInputInstance = window.intlTelInput(phoneInputField, {
                initialCountry: "de", preferredCountries: ["de", "at", "ch"],
                utilsScript: "https://cdn.jsdelivr.net/npm/intl-tel-input@23.0.4/build/js/utils.js",
            });
        }

        function getAreaStatus(points) {
            if (points <= 5) return { label: "Kritischer Engpass", color: "text-brand-orange", bg: "bg-brand-orange" };
            if (points <= 9) return { label: "Instabil", color: "text-orange-500", bg: "bg-orange-500" };
            return { label: "Solide Systematik", color: "text-gray-900", bg: "bg-gray-900" };
        }

        function calculateResult() {
            const fName = document.getElementById('firstName').value.trim();
            const lName = document.getElementById('lastName').value.trim();
            const email = document.getElementById('email').value.trim();
            const revenue = document.getElementById('revenue').value;
            const commitment = document.getElementById('commitment').checked;
            const phoneVal = document.getElementById('phone').value.trim();
            const errorBox = document.getElementById('form-error');
            
            let phoneValid = phoneInputInstance && phoneInputInstance.isValidNumber ? phoneInputInstance.isValidNumber() : phoneVal.length > 5;
            
            if(!fName || !lName || !email || !revenue || !phoneValid || !commitment) {
                errorBox.innerText = "Bitte fülle alle Felder korrekt aus.";
                errorBox.classList.remove('hidden');
                return;
            }

            const totalScore = Object.values(areaScores).reduce((sum, area) => sum + area.points, 0);

            let categoryName = "";
            let categoryDesc = "";
            
            if (totalScore <= 15) {
                categoryName = "Der System-Sklave";
                categoryDesc = "Das Unternehmen führt dich. Ohne dich bricht das System zusammen. Du reagierst auf Probleme statt sie strategisch zu verhindern, verbrennst Kapital durch Blindflug und bist dein eigenes größtes Bottleneck.";
            } else if (totalScore <= 28) {
                categoryName = "Der Operator";
                categoryDesc = "Du arbeitest extrem hart IN deinem Unternehmen, aber nicht AN deinem Unternehmen. Du löst operative Probleme mit Zeit statt mit Systemen. Du hast dir einen gut bezahlten Job kreiert, kein skalierbares Business.";
            } else if (totalScore <= 39) {
                categoryName = "Der Abteilungsleiter";
                categoryDesc = "Du hast gute Ansätze und erste Systeme, steckst aber noch zu tief im Tagesgeschäft. Dir fehlt die finale strategische Distanz und das tiefe Verständnis der KPI-Mechanik, um dich komplett aus der Operation zu ziehen.";
            } else {
                categoryName = "Der CEO";
                categoryDesc = "Echte CEO-Mentalität. Du triffst Entscheidungen datenbasiert und steuerst das System von außen. Jetzt geht es darum, die bestehende Effizienz maximal zu hebeln und den Output zu vervielfachen.";
            }

            // --- EVENT TRACKING LOGIC ---
            const consent = window.marketingConsent === true;
            const eventId = generateEventId();
            const eventTime = Math.floor(Date.now() / 1000);
            const urlParams = getUrlParams();
            const fbc = consent ? (getCookie('_fbc') || urlParams['fbc'] || '') : '';
            const fbp = consent ? (getCookie('_fbp') || urlParams['fbp'] || urlParams['fbd'] || getCookie('_fbd') || '') : '';
            const fbclid = consent ? (urlParams['fbclid'] || '') : '';
            
            const formattedPhone = phoneInputInstance && phoneInputInstance.getNumber ? phoneInputInstance.getNumber() : phoneVal;

            // 1. Meta Pixel Lead Event
            if (consent && typeof fbq === 'function') {
                fbq('track', 'Lead', {
                    content_name: 'CEO Reality Quiz Completion',
                    content_category: categoryName,
                    value: totalScore
                }, { eventID: eventId });
            }

            // 2. Umami Tracking Event
            if (typeof umami !== 'undefined' && umami.track) {
                umami.track('Lead', {
                    category: categoryName,
                    score: totalScore,
                    revenue_bracket: revenue
                });
            }

            // 3. Zapier Webhook
            const payload = {
                firstName: fName,
                lastName: lName,
                email: email,
                phone: formattedPhone,
                revenue: revenue,
                score: totalScore,
                category: categoryName,
                event_name: 'Lead',
                event_id: eventId,
                event_time: eventTime,
                event_source_url: window.location.href,
                user_agent: navigator.userAgent,
                marketing_consent: consent ? 'granted' : 'denied',
                utm_source: urlParams['utm_source'] || '',
                utm_medium: urlParams['utm_medium'] || '',
                utm_campaign: urlParams['utm_campaign'] || '',
                utm_term: urlParams['utm_term'] || '',
                utm_content: urlParams['utm_content'] || '',
                fbclid: fbclid,
                fbc: fbc,
                fbp: fbp
            };

            fetch('https://hooks.zapier.com/hooks/catch/12560168/uv0vxpk/', {
                method: 'POST',
                body: JSON.stringify(payload)
            }).catch(error => console.error('Webhook Error:', error));
            // --- END TRACKING ---

            renderFinalResult(fName, lName, email, categoryName, categoryDesc, totalScore, formattedPhone);
        }

        function renderFinalResult(fName, lName, email, categoryName, categoryDesc, totalScore, formattedPhone) {
            DOM_HEADER.style.display = 'none';
            
            const areaBarsHTML = Object.values(areaScores).map(area => {
                const status = getAreaStatus(area.points);
                const percent = (area.points / area.max) * 100;
                return `
                    <div class="mb-4">
                        <div class="flex justify-between items-end mb-1">
                            <span class="font-bold text-gray-900 uppercase tracking-wide text-sm font-oswald">${area.label}</span>
                            <span class="text-xs font-mono font-bold ${status.color}">${status.label} (${area.points}/${area.max})</span>
                        </div>
                        <div class="w-full bg-gray-200 rounded-full h-2">
                            <div class="${status.bg} h-2 rounded-full transition-all duration-1000" style="width: ${percent}%"></div>
                        </div>
                    </div>
                `;
            }).join('');

            let redFlagsHTML = "";
            if (collectedRedFlags.length > 0) {
                const listItems = collectedRedFlags.map(flag => `
                    <li class="flex items-start gap-3">
                        <i data-lucide="x-octagon" class="w-4 h-4 text-brand-orange mt-0.5 flex-shrink-0"></i>
                        <span class="text-sm text-gray-700 leading-snug">${flag}</span>
                    </li>
                `).join('');
                
                redFlagsHTML = `
                    <div class="mt-8 bg-red-50 border border-brand-orange/20 rounded-xl p-5 sm:p-6">
                        <h4 class="font-oswald text-lg font-bold uppercase text-brand-orange mb-4 flex items-center gap-2">
                            <i data-lucide="alert-triangle" class="w-5 h-5"></i> Deine Kritischen Engpässe (Red Flags)
                        </h4>
                        <ul class="space-y-3">
                            ${listItems}
                        </ul>
                    </div>
                `;
            } else {
                redFlagsHTML = `
                    <div class="mt-8 bg-green-50 border border-green-200 rounded-xl p-5 sm:p-6">
                        <h4 class="font-oswald text-lg font-bold uppercase text-green-700 mb-2 flex items-center gap-2">
                            <i data-lucide="check-circle" class="w-5 h-5"></i> Keine gravierenden Red Flags
                        </h4>
                        <p class="text-sm text-green-800">Du hast in den Kernfragen keine toxischen Verhaltensmuster gezeigt. Starkes Fundament.</p>
                    </div>
                `;
            }

            DOM_CONTENT.innerHTML = `
                <div class="fade-in text-center max-w-2xl mx-auto">
                    <span class="inline-flex items-center gap-2 mb-4 px-3 py-1.5 bg-red-100 border border-red-200 rounded-full text-brand-orange font-mono text-xs font-bold uppercase tracking-widest">
                        <i data-lucide="crosshair" class="w-4 h-4"></i> Analyse Abgeschlossen
                    </span>
                    
                    <h2 class="font-oswald text-4xl md:text-5xl font-bold uppercase text-gray-900 leading-tight mb-6">
                        Reifegrad: <br>
                        <span class="text-transparent bg-clip-text bg-gradient-to-r from-brand-orange to-brand-red text-glow-orange">${categoryName}</span>
                    </h2>
                    
                    <div class="result-card rounded-2xl p-6 sm:p-8 mb-10 shadow-lg text-left">
                        <h3 class="font-oswald text-xl font-bold uppercase text-gray-900 mb-2">Die Zusammenfassung:</h3>
                        <p class="text-gray-700 text-sm sm:text-base leading-relaxed mb-6">
                            ${categoryDesc}
                        </p>
                        
                        <div class="border-t border-gray-200 pt-6">
                            <h4 class="font-oswald text-lg font-bold uppercase text-gray-900 mb-4">Performance nach Bereichen</h4>
                            ${areaBarsHTML}
                        </div>

                        ${redFlagsHTML}

                        <div class="border-t border-red-100 pt-4 mt-6">
                            <div class="text-[0.65rem] sm:text-xs text-gray-500 uppercase tracking-wider font-semibold mb-1">Gesamt-Score</div>
                            <div class="font-mono text-lg text-brand-orange font-bold">${totalScore} / 48 Punkte</div>
                        </div>
                    </div>

                    <div class="border-t border-gray-200 pt-10">
                        <h3 class="font-oswald text-3xl font-bold uppercase text-gray-900 mb-2">Beende den Blindflug.</h3>
                        <p class="text-gray-500 text-sm mb-6">Sichere dir jetzt deinen Reality Check und baue ein echtes Operating System.</p>
                        
                        <!-- Cal.com Embed -->
                        <div id="cal-embed-container" style="width:100%;height:600px;overflow:scroll;border-radius:12px;border:1px solid #e5e7eb" class="bg-white"></div>
                    </div>
                </div>
            `;
            lucide.createIcons();

            (function (C, A, L) { let p = function (a, ar) { a.q.push(ar); }; let d = C.document; C.Cal = C.Cal || function () { let cal = C.Cal; let ar = arguments; if (!cal.loaded) { cal.ns = {}; cal.q = cal.q || []; d.head.appendChild(d.createElement("script")).src = A; cal.loaded = true; } if (ar[0] === L) { const api = function () { p(api, arguments); }; const namespace = ar[1]; api.q = api.q || []; typeof namespace === "string" ? (cal.ns[namespace] = cal.ns[namespace] || api) : p(cal, ar); return; } p(cal, ar); }; })(window, "https://app.cal.com/embed/embed.js", "init");
            Cal("init", {origin:"https://cal.com"});

            const prefillQuery = new URLSearchParams({
                name: `${fName} ${lName}`,
                email: email,
                "responses[phone]": formattedPhone
            }).toString();

            Cal("inline", {
                elementOrSelector: "#cal-embed-container",
                calLink: "team/ceo-reality/realitycheck?" + prefillQuery,
                layout: "month_view"
            });
            Cal("ui", {"theme":"light","styles":{"branding":{"brandColor":"#e60000"}},"hideEventTypeDetails":false,"layout":"month_view"});
        }

        // --- COOKIE INITIALIZATION ---
        document.addEventListener('DOMContentLoaded', function() {
            const stored = getStoredConsent();
            if (stored === 'accepted') {
                window.marketingConsent = true;
                loadMetaPixel();
            } else if (stored === 'rejected') {
                window.marketingConsent = false;
            } else {
                setTimeout(showCookieBanner, 400);
            }
            renderQuestion();
        });
    </script>
</body>
</html>
